name: CRT Scanner

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:      # Pwede ring manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Run CRT Scan
        run: |
          curl -s "https://crt-fina-lz-tag5.vercel.app/api/scan?manual=true" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "Scan triggered"
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
